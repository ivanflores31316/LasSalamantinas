<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Gramsoft by Las Salmantinas</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap');
        :root { --primary: #4f46e5; --primary-dark: #4338ca; }
        body { 
            font-family: 'Poppins', sans-serif; 
            background-color: #f8fafc;
            -webkit-tap-highlight-color: transparent;
            overscroll-behavior-y: contain;
        }
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        .scale-up { animation: scaleUp 0.2s ease-out; }
        @keyframes scaleUp {
            from { transform: scale(0.98); opacity: 0; }
            to { transform: scale(1); opacity: 1; }
        }
        .variant-selected { background-color: var(--primary) !important; color: white !important; border-color: var(--primary-dark) !important; }
        input, textarea, select { font-size: 16px !important; }
        #main-app { display: none; }
        .btn-touch:active { transform: scale(0.96); transition: 0.1s; }
    </style>
</head>
<body class="text-slate-800 antialiased">

    <!-- PANTALLA DE LOGIN -->
    <section id="login-screen" class="fixed inset-0 bg-indigo-900 flex items-center justify-center z-[100] p-6">
        <div class="bg-white p-8 rounded-[2.5rem] shadow-2xl w-full max-w-sm scale-up">
            <div class="text-center mb-8">
                <h1 class="text-4xl font-black text-indigo-700 italic tracking-tighter">Gramsoft</h1>
                <p class="text-slate-400 text-[10px] font-bold tracking-widest uppercase mt-1">Las Salmantinas</p>
            </div>
            <div class="space-y-4">
                <input type="text" id="login-id" class="w-full p-4 bg-slate-50 border-2 border-slate-100 rounded-2xl outline-none" placeholder="No. Empleado">
                <input type="password" id="login-pass" class="w-full p-4 bg-slate-50 border-2 border-slate-100 rounded-2xl outline-none" placeholder="Contraseña">
                <button onclick="handleLogin()" class="w-full bg-indigo-600 text-white py-4 rounded-2xl font-bold btn-touch">Entrar</button>
                <div class="text-center pt-2">
                    <button onclick="accessAdminDirect()" class="text-slate-400 text-[11px] font-bold uppercase hover:text-indigo-500">Modo Admin Directo</button>
                </div>
            </div>
        </div>
    </section>

    <!-- APP PRINCIPAL -->
    <div id="main-app" class="flex flex-col min-h-screen">
        <header class="bg-indigo-700 text-white shadow-lg sticky top-0 z-50 px-4 py-3">
            <div class="container mx-auto flex justify-between items-center">
                <div class="flex flex-col">
                    <h1 class="text-xl font-black italic">Gramsoft</h1>
                    <span id="user-display" class="text-[9px] text-indigo-200 font-bold uppercase tracking-tighter">Usuario: -</span>
                </div>
                <nav class="flex items-center gap-1">
                    <button onclick="showTab('mesas')" class="px-2 py-1.5 rounded-xl hover:bg-indigo-600 transition text-[10px] font-bold uppercase">Mesas</button>
                    <button onclick="showTab('domicilio')" class="px-2 py-1.5 rounded-xl hover:bg-indigo-600 transition text-[10px] font-bold uppercase">Dom</button>
                    <button onclick="showTab('cocina')" class="px-2 py-1.5 rounded-xl hover:bg-indigo-600 transition relative text-[10px] font-bold uppercase">
                        Cocin <span id="cocina-badge" class="absolute -top-1 -right-1 bg-red-500 text-[9px] rounded-full h-4 w-4 flex items-center justify-center hidden border-2 border-indigo-700 font-black">0</span>
                    </button>
                    <button onclick="logout()" class="ml-1 p-2 bg-indigo-800 rounded-xl">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M17 16l4-4m0 0l-4-4m4 4H7" /></svg>
                    </button>
                </nav>
            </div>
        </header>

        <main class="container mx-auto p-4 flex-grow">
            <!-- SECCIÓN MESAS -->
            <section id="mesas" class="tab-content active">
                <div class="flex justify-between items-baseline mb-6 px-1">
                    <h2 class="text-3xl font-black text-slate-800 tracking-tighter">Mesas</h2>
                    <div class="text-[10px] font-black text-slate-400 uppercase bg-slate-100 px-3 py-1 rounded-full" id="mesa-count">...</div>
                </div>
                <div class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-6 gap-3" id="grid-mesas"></div>

                <!-- MODAL MESA -->
                <div id="modal-mesa" class="fixed inset-0 bg-slate-900/60 backdrop-blur-sm hidden flex items-end sm:items-center justify-center p-0 sm:p-4 z-[60]">
                    <div class="bg-white rounded-t-[2.5rem] sm:rounded-[2.5rem] p-6 w-full max-w-md max-h-[95vh] overflow-y-auto shadow-2xl scale-up">
                        <div class="flex justify-between items-start mb-6 border-b border-slate-50 pb-4">
                            <h3 id="modal-mesa-titulo" class="text-2xl font-black text-indigo-900">Mesa #</h3>
                            <button onclick="document.getElementById('modal-mesa').classList.add('hidden')" class="bg-slate-100 p-2.5 rounded-full text-slate-400">✕</button>
                        </div>
                        <div class="mb-6">
                            <label class="block font-black mb-3 text-[10px] text-slate-500 uppercase">Añadir Productos</label>
                            <div id="menu-items-mesa" class="grid grid-cols-1 gap-2 max-h-52 overflow-y-auto"></div>
                        </div>
                        <div class="bg-slate-50 rounded-[2rem] p-5 border-2 border-slate-100">
                            <ul id="lista-pedido-mesa" class="mb-4 text-sm space-y-2 max-h-40 overflow-y-auto"></ul>
                            <div class="flex justify-between items-center font-black text-2xl mb-6 p-4 bg-white rounded-2xl shadow-sm">
                                <span id="total-mesa">$0.00</span>
                            </div>
                            <div class="grid grid-cols-1 gap-2">
                                <button onclick="enviarCocinaMesa()" class="w-full bg-indigo-600 text-white py-4 rounded-2xl font-black shadow-lg btn-touch">Enviar Cocina</button>
                                <button id="btn-pagar-mesa" onclick="pagarMesa()" class="w-full bg-emerald-600 text-white py-4 rounded-2xl font-black btn-touch hidden">Pagar Cuenta</button>
                            </div>
                        </div>
                    </div>
                </div>
            </section>

            <!-- SECCIÓN DOMICILIO -->
            <section id="domicilio" class="tab-content">
                <h2 class="text-3xl font-black mb-6 tracking-tighter">Domicilio</h2>
                <div class="grid lg:grid-cols-2 gap-6">
                    <div class="bg-white p-6 rounded-[2.5rem] shadow-sm border-2 border-slate-50 space-y-3">
                        <input type="text" id="dom-nombre" placeholder="Nombre" class="w-full p-4 bg-slate-50 rounded-2xl outline-none font-bold">
                        <input type="tel" id="dom-tel" placeholder="Teléfono" class="w-full p-4 bg-slate-50 rounded-2xl outline-none font-bold">
                        <textarea id="dom-calle" placeholder="Dirección" class="w-full p-4 bg-slate-50 rounded-2xl outline-none font-bold h-24 resize-none"></textarea>
                    </div>
                    <div class="bg-white p-6 rounded-[2.5rem] shadow-sm border-2 border-slate-50">
                        <div id="menu-items-dom" class="grid grid-cols-1 gap-2 mb-6 max-h-40 overflow-y-auto"></div>
                        <ul id="lista-pedido-dom" class="mb-4 text-xs bg-slate-50 p-4 rounded-2xl space-y-1"></ul>
                        <div class="flex justify-between items-center mb-6">
                            <span class="font-black text-3xl" id="total-dom">$0.00</span>
                            <button onclick="enviarDomicilio()" class="bg-indigo-600 text-white px-6 py-4 rounded-2xl font-black btn-touch">Guardar</button>
                        </div>
                    </div>
                </div>
            </section>

            <!-- SECCIÓN COCINA -->
            <section id="cocina" class="tab-content">
                <h2 class="text-3xl font-black mb-8">Cocina</h2>
                <div id="lista-cocina" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6"></div>
            </section>

            <!-- SECCIÓN ADMIN -->
            <section id="admin" class="tab-content">
                <div id="admin-login" class="max-w-sm mx-auto mt-10 bg-white p-8 rounded-[2.5rem] shadow-2xl text-center">
                    <h2 class="text-2xl font-black mb-6">Admin PIN</h2>
                    <input type="password" id="admin-pass" class="w-full p-5 border rounded-3xl mb-6 text-center text-3xl font-black">
                    <button onclick="checkAdmin()" class="w-full bg-slate-900 text-white py-5 rounded-[2rem] font-black">Entrar</button>
                </div>

                <div id="admin-panel" class="hidden space-y-8">
                    <div class="flex justify-between items-center bg-white p-6 rounded-3xl shadow-sm">
                        <h2 class="text-2xl font-black text-indigo-900">Configuración</h2>
                        <div class="font-black text-xl text-emerald-600">Ventas: <span id="stat-ventas">$0.00</span></div>
                    </div>

                    <div class="grid lg:grid-cols-2 gap-8">
                        <!-- MENÚ -->
                        <div class="bg-white p-6 rounded-[2.5rem] shadow-sm">
                            <h3 class="font-black mb-4">Gestión de Menú</h3>
                            <div id="admin-menu-list" class="space-y-2 mb-6 max-h-60 overflow-y-auto pr-2"></div>
                            <div class="bg-indigo-50 p-4 rounded-3xl space-y-2">
                                <input type="text" id="new-item-name" placeholder="Producto" class="w-full p-3 rounded-xl border">
                                <div class="grid grid-cols-2 gap-2">
                                    <input type="number" id="new-item-price" placeholder="Precio Base" class="p-3 rounded-xl border">
                                    <input type="number" id="new-item-extra-price" placeholder="Precio Extra" class="p-3 rounded-xl border">
                                </div>
                                <input type="text" id="new-item-v1" placeholder="Bases (coma)" class="w-full p-3 rounded-xl border">
                                <input type="text" id="new-item-v2" placeholder="Guisos (coma)" class="w-full p-3 rounded-xl border">
                                <button onclick="addItemToMenu()" class="w-full bg-indigo-600 text-white py-3 rounded-xl font-bold">Añadir Producto</button>
                            </div>
                        </div>

                        <!-- EMPLEADOS -->
                        <div class="bg-white p-6 rounded-[2.5rem] shadow-sm">
                            <h3 class="font-black mb-4">Empleados</h3>
                            <div id="admin-empleados-list" class="space-y-2 mb-6 max-h-40 overflow-y-auto"></div>
                            <div class="bg-slate-50 p-4 rounded-3xl space-y-2">
                                <input type="text" id="emp-name" placeholder="Nombre" class="w-full p-3 rounded-xl border">
                                <input type="text" id="emp-id" placeholder="No. Empleado" class="w-full p-3 rounded-xl border">
                                <input type="password" id="emp-pass" placeholder="Password" class="w-full p-3 rounded-xl border">
                                <button onclick="addEmpleadoAdmin()" class="w-full bg-slate-800 text-white py-3 rounded-xl font-bold">Crear Empleado</button>
                            </div>
                        </div>

                        <!-- MAPA DE MESAS -->
                        <div class="bg-white p-6 rounded-[2.5rem] shadow-sm lg:col-span-2">
                            <h3 class="font-black mb-4">Mapa de Mesas</h3>
                            <div id="admin-mesas-list" class="grid grid-cols-2 sm:grid-cols-4 gap-3 mb-6"></div>
                            <button onclick="addMesaAdmin()" class="w-full bg-indigo-50 text-indigo-600 py-4 rounded-2xl font-black text-sm uppercase tracking-wider hover:bg-indigo-100 transition btn-touch">+ Agregar Nueva Mesa</button>
                        </div>
                    </div>
                </div>
            </section>
        </main>
    </div>

    <!-- MODAL PERSONALIZACIÓN PRODUCTO -->
    <div id="modal-custom" class="fixed inset-0 bg-slate-900/80 backdrop-blur-md hidden flex items-center justify-center p-4 z-[100]">
        <div class="bg-white rounded-[3rem] p-8 w-full max-w-sm shadow-2xl scale-up max-h-[90vh] overflow-y-auto">
            <div id="custom-item-name" class="text-3xl font-black mb-1 text-indigo-900 text-center"></div>
            <div id="v1-container" class="mb-6 mt-4">
                <label class="block text-[10px] font-black text-slate-400 mb-2 uppercase">Tipo de Base:</label>
                <div id="v1-list" class="flex flex-wrap gap-2"></div>
            </div>
            <div id="v2-container" class="mb-6">
                <label class="block text-[10px] font-black text-slate-400 mb-2 uppercase">Guisados (Máx 3):</label>
                <div id="v2-list" class="flex flex-wrap gap-2"></div>
            </div>
            <input type="text" id="custom-nota" class="w-full p-4 bg-slate-50 border rounded-2xl outline-none mb-6" placeholder="Notas adicionales">
            <button id="btn-confirm-custom" class="w-full bg-indigo-600 text-white py-5 rounded-[2rem] font-black btn-touch">Confirmar</button>
            <button onclick="closeCustomModal()" class="w-full text-slate-400 py-3 font-bold text-xs uppercase">Cancelar</button>
        </div>
    </div>

    <div id="toast" class="fixed bottom-10 left-1/2 -translate-x-1/2 bg-slate-900 text-white px-8 py-4 rounded-full shadow-2xl translate-y-32 transition-transform duration-300 z-[200] font-black text-[12px] uppercase"></div>

    <script>
        const SB_URL = "https://akytawkskdiuwcmwxbxl.supabase.co";
        const SB_KEY = "sb_publishable_uDeJknnlbcXxUdx9uiFC6Q_y02UVT_5";
        const _supabase = supabase.createClient(SB_URL, SB_KEY);

        let menu = [], mesas = [], empleados = [], comandasCocina = [];
        let ventasTotales = 0, currentMesaId = null, currentTarget = '', tempPedidoDom = [], pendingItem = null, selectedV1 = null, selectedV2 = [];

        // --- LOGIN ---
        async function handleLogin() {
            const id = document.getElementById('login-id').value;
            const pass = document.getElementById('login-pass').value;
            if(!id || !pass) return showToast("Faltan datos");

            const { data, error } = await _supabase.from('empleados')
                .select('*')
                .eq('numero_empleado', id)
                .eq('password', pass)
                .single();
            
            if (data) {
                initApp(data.nombre);
            } else {
                showToast("Acceso denegado");
            }
        }

        function accessAdminDirect() { initApp("Administrador"); showTab('admin'); }

        function initApp(userName) {
            document.getElementById('login-screen').classList.add('hidden');
            document.getElementById('main-app').style.display = 'flex';
            document.getElementById('user-display').innerText = `Usuario: ${userName}`;
            initData();
        }

        async function initData() {
            await Promise.all([fetchMenu(), fetchMesas(), fetchVentas(), fetchEmpleados()]);
            renderMesas();
        }

        async function fetchMenu() { const { data } = await _supabase.from('menu').select('*'); if(data) menu = data; }
        async function fetchMesas() { const { data } = await _supabase.from('mesas').select('*').order('id', {ascending: true}); if(data) mesas = data; }
        async function fetchEmpleados() { const { data } = await _supabase.from('empleados').select('*'); if(data) empleados = data; }
        async function fetchVentas() { 
            const { data } = await _supabase.from('config').select('valor').eq('clave', 'ventas_totales').single(); 
            ventasTotales = data ? parseFloat(data.valor) : 0; 
        }

        function showTab(tabId) {
            document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
            document.getElementById(tabId).classList.add('active');
            if(tabId === 'mesas') renderMesas();
            if(tabId === 'domicilio') renderMenuUI('dom');
            if(tabId === 'admin') renderAdminData();
            updateCocinaUI();
            window.scrollTo(0,0);
        }

        function showToast(msg) {
            const t = document.getElementById('toast');
            t.innerText = msg;
            t.classList.remove('translate-y-32');
            setTimeout(() => t.classList.add('translate-y-32'), 2500);
        }

        // --- GESTIÓN DE MESAS (FRONTEND) ---
        function renderMesas() {
            const grid = document.getElementById('grid-mesas');
            grid.innerHTML = '';
            mesas.forEach(m => {
                const btn = document.createElement('div');
                btn.className = `cursor-pointer p-6 rounded-[2.5rem] border-4 transition-all btn-touch text-center ${m.ocupada ? 'bg-orange-50 border-orange-400' : 'bg-white border-slate-100'}`;
                btn.innerHTML = `
                    <div class="text-[9px] font-black uppercase ${m.ocupada ? 'text-orange-500' : 'text-slate-400'}">${m.ocupada ? 'Ocupada' : 'Libre'}</div>
                    <div class="text-4xl font-black my-1 text-slate-800">${m.id}</div>
                    <div class="text-[10px] font-black px-3 py-1 rounded-full inline-block bg-slate-100">$${parseFloat(m.total || 0).toFixed(0)}</div>
                `;
                btn.onclick = () => abrirMesa(m.id);
                grid.appendChild(btn);
            });
            document.getElementById('mesa-count').innerText = `${mesas.filter(m => !m.ocupada).length} Disponibles`;
        }

        function abrirMesa(id) {
            currentMesaId = id;
            const mesa = mesas.find(m => m.id == id);
            document.getElementById('modal-mesa-titulo').innerText = `Mesa ${id}`;
            document.getElementById('modal-mesa').classList.remove('hidden');
            document.getElementById('btn-pagar-mesa').classList.toggle('hidden', !mesa.ocupada);
            renderPedidoMesa();
            renderMenuUI('mesa');
        }

        function renderMenuUI(target) {
            const id = target === 'mesa' ? 'menu-items-mesa' : 'menu-items-dom';
            document.getElementById(id).innerHTML = menu.map(m => `
                <button onclick="openCustomModal(${m.id}, '${target}')" class="flex justify-between p-4 border rounded-xl font-bold text-xs bg-white btn-touch">
                    <span>${m.nombre}</span> <span class="text-indigo-600">$${m.precio}</span>
                </button>
            `).join('');
        }

        function renderPedidoMesa() {
            const mesa = mesas.find(m => m.id == currentMesaId);
            const list = [...(mesa.pedido || []), ...(mesa.pedidoTemporal || [])];
            document.getElementById('lista-pedido-mesa').innerHTML = list.map(i => `
                <li class="p-3 bg-white border rounded-xl flex justify-between">
                    <span class="text-xs font-bold">${i.nombre} <br><small class="text-slate-400 uppercase font-black text-[9px]">${i.v1 || ''} • ${i.v2?.join(', ') || ''}</small></span>
                    <span class="font-black text-indigo-600">$${i.precio}</span>
                </li>
            `).join('');
            document.getElementById('total-mesa').innerText = `Total: $${parseFloat(mesa.total || 0).toFixed(2)}`;
        }

        async function enviarCocinaMesa() {
            const mesa = mesas.find(m => m.id == currentMesaId);
            if (!mesa.pedidoTemporal?.length) return showToast("Mesa vacía");
            comandasCocina.push({ id: Date.now(), origen: `Mesa ${mesa.id}`, items: [...mesa.pedidoTemporal], status: 'pendiente', timestamp: new Date().toLocaleTimeString() });
            mesa.pedido = [...(mesa.pedido || []), ...mesa.pedidoTemporal];
            mesa.pedidoTemporal = [];
            mesa.ocupada = true;
            await _supabase.from('mesas').upsert(mesa);
            renderPedidoMesa(); renderMesas(); showToast("Enviado!");
        }

        async function pagarMesa() {
            const mesa = mesas.find(m => m.id == currentMesaId);
            ventasTotales += parseFloat(mesa.total);
            mesa.pedido = []; mesa.total = 0; mesa.ocupada = false; mesa.pedidoTemporal = [];
            await _supabase.from('mesas').upsert(mesa);
            await _supabase.from('config').upsert({ clave: 'ventas_totales', valor: ventasTotales.toString() });
            document.getElementById('modal-mesa').classList.add('hidden');
            renderMesas(); showToast("Pagado!");
        }

        // --- GESTIÓN ADMIN (MESAS, EMPLEADOS, MENU) ---
        function renderAdminData() {
            document.getElementById('stat-ventas').innerText = `$${ventasTotales.toFixed(2)}`;
            renderAdminMenu();
            renderAdminEmpleados();
            renderAdminMesas();
        }

        // CORRECCIÓN: Agregar y quitar mesas sincronizado con SQL
        function renderAdminMesas() {
            const list = document.getElementById('admin-mesas-list');
            list.innerHTML = mesas.map(m => `
                <div class="p-4 bg-slate-50 border rounded-2xl flex justify-between items-center scale-up">
                    <div class="flex flex-col">
                        <span class="text-[10px] font-black text-slate-400 uppercase">Mesa</span>
                        <span class="text-xl font-black text-slate-700">${m.id}</span>
                    </div>
                    <button onclick="deleteMesa(${m.id})" class="p-2 bg-red-50 text-red-500 rounded-xl hover:bg-red-100 transition">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" viewBox="0 0 20 20" fill="currentColor">
                          <path fill-rule="evenodd" d="M9 2a1 1 0 00-.894.553L7.382 4H4a1 1 0 000 2v10a2 2 0 002 2h8a2 2 0 002-2V6a1 1 0 100-2h-3.382l-.724-1.447A1 1 0 0011 2H9zM7 8a1 1 0 012 0v6a1 1 0 11-2 0V8zm5-1a1 1 0 00-1 1v6a1 1 0 102 0V8a1 1 0 00-1-1z" clip-rule="evenodd" />
                        </svg>
                    </button>
                </div>
            `).join('');
        }

        async function addMesaAdmin() {
            // Calcular el siguiente ID de mesa disponible
            const nextId = mesas.length ? Math.max(...mesas.map(m => m.id)) + 1 : 1;
            
            // Estructura respetando el SQL (pedido y pedidoTemporal son JSONB con default [])
            const newMesa = { 
                id: nextId, 
                ocupada: false, 
                total: 0 
                // Nota: pedido y pedidoTemporal se crean automáticamente por el default del SQL []
            };

            const { data, error } = await _supabase.from('mesas').insert(newMesa).select();
            
            if (!error) {
                // Actualizar estado local
                mesas.push(data[0]);
                mesas.sort((a,b) => a.id - b.id);
                renderAdminMesas();
                renderMesas();
                showToast(`Mesa ${nextId} agregada`);
            } else {
                console.error(error);
                showToast("Error al agregar mesa");
            }
        }

        async function deleteMesa(id) {
            const { error } = await _supabase.from('mesas').delete().eq('id', id);
            
            if (!error) {
                // Actualizar estado local
                mesas = mesas.filter(m => m.id !== id);
                renderAdminMesas();
                renderMesas();
                showToast(`Mesa ${id} eliminada`);
            } else {
                showToast("Error al eliminar mesa");
            }
        }

        // --- MENU Y EMPLEADOS ---
        function renderAdminMenu() {
            document.getElementById('admin-menu-list').innerHTML = menu.map(m => `
                <div class="p-3 border rounded-xl flex justify-between items-center text-xs font-bold bg-slate-50">
                    <span>${m.nombre} ($${m.precio})</span>
                    <button onclick="deleteMenuItem(${m.id})" class="text-red-500">Borrar</button>
                </div>
            `).join('');
        }

        async function addItemToMenu() {
            const n = document.getElementById('new-item-name').value;
            const p = parseFloat(document.getElementById('new-item-price').value);
            const e = parseFloat(document.getElementById('new-item-extra-price').value) || 0;
            const v1 = document.getElementById('new-item-v1').value.split(',').map(s=>s.trim()).filter(s=>s);
            const v2 = document.getElementById('new-item-v2').value.split(',').map(s=>s.trim()).filter(s=>s);
            if(!n || isNaN(p)) return showToast("Datos incompletos");
            await _supabase.from('menu').insert({ nombre: n, precio: p, extraPrice: e, v1, v2 });
            fetchMenu().then(renderAdminMenu);
            showToast("Producto añadido");
        }

        async function deleteMenuItem(id) {
            await _supabase.from('menu').delete().eq('id', id);
            fetchMenu().then(renderAdminMenu);
        }

        function renderAdminEmpleados() {
            document.getElementById('admin-empleados-list').innerHTML = empleados.map(e => `
                <div class="flex justify-between p-2 bg-slate-50 border rounded-xl text-[10px] font-bold mb-1">
                    <span>${e.nombre} (#${e.numero_empleado})</span>
                    <button onclick="deleteEmpleado('${e.id}')" class="text-red-400">Eliminar</button>
                </div>
            `).join('');
        }

        async function addEmpleadoAdmin() {
            const nombre = document.getElementById('emp-name').value;
            const numero_empleado = document.getElementById('emp-id').value;
            const password = document.getElementById('emp-pass').value;
            if(!nombre || !numero_empleado || !password) return showToast("Faltan datos");

            const { error } = await _supabase.from('empleados').insert({ nombre, numero_empleado, password });
            if(!error) {
                fetchEmpleados().then(renderAdminEmpleados);
                showToast("Empleado guardado");
                document.getElementById('emp-name').value = ''; document.getElementById('emp-id').value = ''; document.getElementById('emp-pass').value = '';
            } else showToast("Error al guardar");
        }

        async function deleteEmpleado(id) {
            await _supabase.from('empleados').delete().eq('id', id);
            fetchEmpleados().then(renderAdminEmpleados);
        }

        // --- COCINA ---
        function updateCocinaUI() {
            const list = document.getElementById('lista-cocina');
            const pends = comandasCocina.filter(c => c.status === 'pendiente');
            document.getElementById('cocina-badge').innerText = pends.length;
            document.getElementById('cocina-badge').classList.toggle('hidden', !pends.length);
            list.innerHTML = pends.map(c => `
                <div class="bg-white rounded-[2rem] border-t-8 border-indigo-700 p-6 shadow-lg scale-up">
                    <div class="flex justify-between mb-4"><h4 class="font-black">${c.origen}</h4><span class="text-[9px]">${c.timestamp}</span></div>
                    <ul class="mb-4 space-y-2 text-xs">
                        ${c.items.map(i => `<li class="border-b pb-1 font-bold">${i.nombre} <br><small class="text-indigo-500">${i.v1 || ''} / ${i.v2?.join(',')}</small></li>`).join('')}
                    </ul>
                    <button onclick="completarPedido(${c.id})" class="w-full bg-emerald-500 text-white py-3 rounded-xl font-black">LISTO</button>
                </div>
            `).join('');
        }
        function completarPedido(id) { comandasCocina.find(c => c.id == id).status = 'listo'; updateCocinaUI(); }

        // --- DOMICILIO ---
        function renderResumenDom() {
            document.getElementById('lista-pedido-dom').innerHTML = tempPedidoDom.map(i => `<li class="flex justify-between"><span>${i.nombre}</span><b>$${i.precio}</b></li>`).join('');
            const total = tempPedidoDom.reduce((s, i) => s + i.precio, 0);
            document.getElementById('total-dom').innerText = `$${total.toFixed(0)}`;
        }
        async function enviarDomicilio() {
            if(!tempPedidoDom.length) return showToast("Sin productos");
            comandasCocina.push({ id: Date.now(), origen: `DOM: ${document.getElementById('dom-nombre').value}`, items: [...tempPedidoDom], status: 'pendiente', timestamp: new Date().toLocaleTimeString() });
            tempPedidoDom = []; renderResumenDom(); showToast("Orden guardada"); showTab('mesas');
        }

        // --- CUSTOM MODAL ---
        function openCustomModal(itemId, target) {
            currentTarget = target;
            pendingItem = menu.find(m => m.id === itemId);
            selectedV1 = null; selectedV2 = [];
            document.getElementById('custom-item-name').innerText = pendingItem.nombre;
            document.getElementById('custom-nota').value = '';
            document.getElementById('v1-list').innerHTML = (pendingItem.v1 || []).map(v => `<button onclick="selectV1(this, '${v}')" class="px-4 py-2 bg-slate-100 rounded-xl text-[10px] font-black transition">${v}</button>`).join('');
            document.getElementById('v1-container').classList.toggle('hidden', !pendingItem.v1?.length);
            document.getElementById('v2-list').innerHTML = (pendingItem.v2 || []).map(v => `<button onclick="selectV2(this, '${v}')" class="px-4 py-2 bg-slate-100 rounded-xl text-[10px] font-black transition">${v}</button>`).join('');
            document.getElementById('v2-container').classList.toggle('hidden', !pendingItem.v2?.length);
            document.getElementById('modal-custom').classList.remove('hidden');
        }
        function selectV1(el, val) { document.querySelectorAll('#v1-list button').forEach(b => b.classList.remove('variant-selected')); el.classList.add('variant-selected'); selectedV1 = val; }
        function selectV2(el, val) {
            const idx = selectedV2.indexOf(val);
            if (idx > -1) { selectedV2.splice(idx, 1); el.classList.remove('variant-selected'); }
            else { if(selectedV2.length >= 3) return showToast("Máximo 3"); selectedV2.push(val); el.classList.add('variant-selected'); }
        }
        document.getElementById('btn-confirm-custom').onclick = () => {
            const extra = Math.max(0, selectedV2.length - 1) * (pendingItem.extraPrice || 0);
            const total = parseFloat(pendingItem.precio) + extra;
            const item = { nombre: `${pendingItem.nombre} ${document.getElementById('custom-nota').value}`, precio: total, v1: selectedV1, v2: [...selectedV2] };
            if (currentTarget === 'mesa') {
                const mesa = mesas.find(m => m.id == currentMesaId);
                mesa.pedidoTemporal = mesa.pedidoTemporal || [];
                mesa.pedidoTemporal.push(item);
                mesa.total = (parseFloat(mesa.total) || 0) + total;
                renderPedidoMesa();
            } else { tempPedidoDom.push(item); renderResumenDom(); }
            closeCustomModal();
        };
        function closeCustomModal() { document.getElementById('modal-custom').classList.add('hidden'); }

        // --- GENERAL ---
        function checkAdmin() { 
            if(document.getElementById('admin-pass').value === "1234") {
                document.getElementById('admin-login').classList.add('hidden');
                document.getElementById('admin-panel').classList.remove('hidden');
                renderAdminData();
            } else showToast("PIN Erróneo");
        }
        function logout() { location.reload(); }
    </script>
</body>
</html>
