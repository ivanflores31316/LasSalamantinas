<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SaborPOS Pro - Sistema Integral</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #f3f4f6; }
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        .variant-btn.active { border-color: #ea580c; background-color: #fff7ed; color: #ea580c; }
        .nav-btn.active { color: #ea580c; background-color: #fff7ed; }
        .spin-anim { animation: spin 1s linear; }
        @keyframes spin { 100% { transform: rotate(360deg); } }
        /* Mejora de scroll para el menú cuando hay muchos ítems */
        #order-items { max-height: 50vh; overflow-y: auto; }
    </style>
</head>
<body class="min-h-screen">

    <div id="login-screen" class="fixed inset-0 z-[100] flex items-center justify-center bg-orange-600">
        <div class="bg-white p-8 rounded-3xl shadow-2xl w-full max-w-sm m-4 text-center">
            <i data-lucide="utensils-crosses" class="text-orange-600 w-12 h-12 mx-auto mb-2"></i>
            <h1 class="text-3xl font-black text-gray-800 mb-8 italic">SaborPOS</h1>
            <div class="space-y-4">
                <input type="text" id="emp-id" placeholder="ID Usuario" class="w-full px-4 py-3 rounded-xl border outline-none">
                <input type="password" id="emp-pass" placeholder="PIN" class="w-full px-4 py-3 rounded-xl border outline-none">
                <button onclick="attemptLogin()" class="w-full bg-orange-600 text-white py-4 rounded-xl font-bold">ENTRAR</button>
            </div>
        </div>
    </div>

    <div id="main-app" class="hidden pb-24 lg:pb-0 lg:pl-64">
        <nav class="fixed bottom-0 left-0 right-0 bg-white border-t lg:border-t-0 lg:border-r lg:w-64 lg:top-0 lg:h-full z-40 flex lg:flex-col justify-around lg:justify-start lg:p-4 shadow-2xl">
            <div class="hidden lg:block mb-8 px-4 pt-4 font-black text-2xl text-orange-600 italic">SaborPOS</div>
            <button onclick="showTab('mesas')" class="nav-btn p-3 flex flex-col lg:flex-row items-center lg:px-4 lg:mb-2 text-gray-500 rounded-xl"><i data-lucide="layout-grid" class="lg:mr-3"></i><span>Salón</span></button>
            <button onclick="showTab('domicilio')" class="nav-btn p-3 flex flex-col lg:flex-row items-center lg:px-4 lg:mb-2 text-gray-500 rounded-xl"><i data-lucide="truck" class="lg:mr-3"></i><span>Envíos</span></button>
            <button onclick="showTab('cocina')" class="nav-btn p-3 flex flex-col lg:flex-row items-center lg:px-4 lg:mb-2 text-gray-500 rounded-xl"><i data-lucide="flame" class="lg:mr-3"></i><span>Cocina</span></button>
            <button onclick="checkAdminAccess()" class="nav-btn p-3 flex flex-col lg:flex-row items-center lg:px-4 lg:mb-2 text-gray-500 rounded-xl"><i data-lucide="shield-check" class="lg:mr-3"></i><span>Admin</span></button>
            <button onclick="manualRefresh(this)" class="p-3 flex flex-col lg:flex-row items-center lg:px-4 lg:mb-2 text-blue-600 font-bold"><i data-lucide="refresh-cw" class="lg:mr-3"></i><span>Actualizar</span></button>
            <button onclick="location.reload()" class="p-3 flex flex-col lg:flex-row items-center lg:px-4 text-red-500 mt-auto"><i data-lucide="log-out" class="lg:mr-3"></i><span>Salir</span></button>
        </nav>

        <main class="p-4 lg:p-8 max-w-7xl mx-auto">
            <div id="tab-mesas" class="tab-content active">
                <h2 class="text-3xl font-black mb-6">Mesas</h2>
                <div id="grid-mesas" class="grid grid-cols-2 md:grid-cols-4 lg:grid-cols-5 gap-6"></div>
            </div>

            <div id="tab-domicilio" class="tab-content">
                <h2 class="text-3xl font-black mb-6">Envíos y Pickup</h2>
                <div class="grid lg:grid-cols-3 gap-8">
                    <div class="bg-white p-6 rounded-3xl border shadow-sm h-fit">
                        <div class="flex gap-2 mb-4">
                            <button onclick="setDeliveryType('domicilio')" id="btn-dom" class="flex-1 py-2 rounded-xl font-bold bg-orange-600 text-white">Domicilio</button>
                            <button onclick="setDeliveryType('pickup')" id="btn-pick" class="flex-1 py-2 rounded-xl font-bold bg-gray-100 text-gray-500">Pickup</button>
                        </div>
                        <div class="space-y-3">
                            <input type="text" id="ext-name" placeholder="Nombre Cliente" class="w-full p-3 border rounded-xl">
                            <input type="tel" id="ext-phone" placeholder="Número de Celular" class="w-full p-3 border rounded-xl">
                            <textarea id="ext-address" placeholder="Dirección Completa" class="w-full p-3 border rounded-xl h-24"></textarea>
                            <button onclick="createExternalOrder()" class="w-full bg-blue-600 text-white py-4 rounded-xl font-bold">Crear Pedido</button>
                        </div>
                    </div>
                    <div id="list-external" class="lg:col-span-2 grid gap-4"></div>
                </div>
            </div>

            <div id="tab-cocina" class="tab-content">
                <div class="flex justify-between items-center mb-6">
                    <h2 class="text-3xl font-black">Comandas</h2>
                    <span class="text-xs text-green-500 font-bold flex items-center"><i data-lucide="radio" class="w-3 mr-1"></i> Tiempo Real Activo</span>
                </div>
                <div id="kitchen-orders" class="grid md:grid-cols-2 lg:grid-cols-3 gap-6"></div>
            </div>

            <div id="tab-admin" class="tab-content">
                <h2 class="text-3xl font-black mb-6 italic">Panel Administrativo</h2>
                <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-8">
                    <div class="bg-white p-6 rounded-3xl border">
                        <p class="text-xs font-bold text-gray-400">EFECTIVO HOY</p>
                        <h3 id="total-efectivo" class="text-3xl font-black text-green-600">$0.00</h3>
                    </div>
                    <button onclick="doCorteCaja()" class="bg-gray-900 text-white rounded-3xl p-6 font-bold flex flex-col items-center justify-center">
                        <i data-lucide="file-text" class="mb-2"></i> GENERAR CORTE (PDF)
                    </button>
                </div>
                <div class="grid lg:grid-cols-2 gap-8">
                    <div class="bg-white p-6 rounded-3xl border">
                        <h4 class="font-bold mb-4">Menú</h4>
                        <div class="space-y-2 mb-4">
                            <input type="text" id="p-name" placeholder="Producto" class="w-full p-2 border rounded-lg">
                            <input type="number" id="p-price" placeholder="Precio" class="w-full p-2 border rounded-lg">
                            <input type="text" id="p-varA" placeholder="V1 (Guisos) - comas" class="w-full p-2 border rounded-lg">
                            <input type="text" id="p-varB" placeholder="V2 (Extras) - comas" class="w-full p-2 border rounded-lg">
                            <button onclick="addProduct()" class="w-full bg-orange-600 text-white py-2 rounded-lg font-bold">Guardar</button>
                        </div>
                        <div id="admin-menu-list" class="space-y-2 max-h-60 overflow-y-auto"></div>
                    </div>
                    <div class="space-y-6">
                        <div class="bg-white p-6 rounded-3xl border">
                            <h4 class="font-bold mb-2">Mesas</h4>
                            <div class="flex gap-2 mb-2"><input type="number" id="m-number" class="w-20 p-2 border rounded-lg"><button onclick="addMesa()" class="bg-black text-white px-4 rounded-lg">Añadir</button></div>
                            <div id="admin-mesas-list" class="flex flex-wrap gap-2"></div>
                        </div>
                        <div class="bg-white p-6 rounded-3xl border">
                            <h4 class="font-bold mb-4">Registro de Empleados</h4>
                            <div class="space-y-2 mb-4">
                                <input type="number" id="e-id" placeholder="Número de Empleado" class="w-full p-2 border rounded-lg text-sm">
                                <input type="text" id="e-name" placeholder="Nombre completo" class="w-full p-2 border rounded-lg text-sm">
                                <input type="password" id="e-pass" placeholder="Contraseña/PIN" class="w-full p-2 border rounded-lg text-sm">
                                <button onclick="addEmployee()" class="w-full bg-blue-600 text-white py-2 rounded-lg font-bold text-sm">Registrar Empleado</button>
                            </div>
                            <div id="admin-employees-list" class="space-y-2 max-h-40 overflow-y-auto"></div>
                        </div>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <div id="order-modal" class="fixed inset-0 bg-black/60 z-[200] hidden flex items-center justify-center p-4">
        <div class="bg-white w-full max-w-6xl h-[90vh] rounded-[2rem] flex flex-col overflow-hidden shadow-2xl">
            <div class="p-6 bg-orange-600 text-white flex justify-between items-center">
                <h3 id="order-title" class="text-2xl font-black italic">Pedido</h3>
                <button onclick="closeOrderModal()"><i data-lucide="x"></i></button>
            </div>
            <div class="flex-1 flex flex-col md:flex-row overflow-hidden">
                <div id="menu-container" class="flex-1 p-6 overflow-y-auto bg-gray-50">
                    <div id="menu-selector" class="grid grid-cols-2 sm:grid-cols-3 gap-4"></div>
                </div>
                <div id="product-config" class="hidden flex-1 p-6 flex flex-col bg-white overflow-y-auto">
                    <h4 id="config-name" class="text-2xl font-black mb-6"></h4>
                    <div class="space-y-6 flex-1">
                        <div><label class="font-bold text-xs text-gray-400">Variante A (Máx 4)</label><div id="v1-options" class="flex flex-wrap gap-2"></div></div>
                        <div><label class="font-bold text-xs text-gray-400">Variante B (Máx 4)</label><div id="v2-options" class="flex flex-wrap gap-2"></div></div>
                        <div id="extra-charge-ui" class="p-4 bg-orange-50 border border-orange-100 rounded-2xl"></div>
                        <textarea id="config-note" class="w-full p-4 border rounded-2xl h-24" placeholder="Notas..."></textarea>
                    </div>
                    <div class="flex gap-4 mt-6">
                        <button onclick="cancelConfig()" class="flex-1 p-4 bg-gray-200 rounded-2xl font-bold">Atrás</button>
                        <button onclick="confirmItem()" class="flex-1 p-4 bg-orange-600 text-white rounded-2xl font-bold">Agregar</button>
                    </div>
                </div>
                <div class="w-full md:w-80 p-6 border-l bg-white flex flex-col overflow-hidden">
                    <div id="order-items" class="flex-1 overflow-y-auto space-y-2 mb-4 pr-2"></div>
                    <div class="border-t pt-4">
                        <div class="flex justify-between font-black text-2xl mb-4"><span>TOTAL</span><span id="order-total">$0.00</span></div>
                        <button onclick="openPayment()" class="w-full bg-green-600 text-white py-4 rounded-xl font-bold">COBRAR</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div id="payment-modal" class="fixed inset-0 bg-black/80 z-[300] hidden flex items-center justify-center">
        <div class="bg-white rounded-3xl p-8 max-w-sm w-full text-center">
            <h3 class="text-xl font-bold mb-6">Método de Pago</h3>
            <button onclick="finalizeSale('Efectivo')" class="w-full p-5 bg-gray-100 rounded-2xl font-bold mb-2">EFECTIVO</button>
            <button onclick="finalizeSale('Tarjeta')" class="w-full p-5 bg-gray-100 rounded-2xl font-bold">TARJETA</button>
            <button onclick="document.getElementById('payment-modal').classList.add('hidden')" class="mt-4 text-gray-400">Cancelar</button>
        </div>
    </div>

    <script>
        const _supabase = supabase.createClient('https://wnboqxpggbvktrumqcat.supabase.co', 'sb_publishable_xbTlbpq30V9ZwX6xyEx3bA_-LNiuI0p');

        let state = { menu: [], mesas: [], externalOrders: [], currentUser: null, isAdmin: false, kitchenHide: [], history: [], employees: [] };
        let activeTarget = { type: null, id: null };
        let currentDeliveryType = 'domicilio';
        let tempItem = null;
        let selectedV1 = []; let selectedV2 = []; 
        let extraChargeApplied = true;

        async function loadInitialData() {
            const { data: menu } = await _supabase.from('menu').select('*').order('name');
            const { data: mesas } = await _supabase.from('mesas').select('*').order('id');
            const { data: emps } = await _supabase.from('empleados').select('*');
            const { data: ventas } = await _supabase.from('ventas').select('*').eq('archivado', false);
            
            state.menu = menu || [];
            state.mesas = (mesas || []).map(m => ({...m, order: JSON.parse(m.order || '[]')}));
            state.employees = emps || [];
            state.history = ventas || [];
            
            renderTables(); 
            renderExternalOrders(); 
            renderKitchen(); 
            renderAdminLists(); 
            updateAdminStats(); 
            lucide.createIcons();
        }

        function setupRealtime() {
            _supabase.channel('db-changes')
                .on('postgres_changes', { event: '*', schema: 'public', table: 'mesas' }, () => { loadInitialData(); })
                .on('postgres_changes', { event: 'INSERT', schema: 'public', table: 'ventas' }, () => { loadInitialData(); })
                .subscribe();
        }

        async function manualRefresh(btn) {
            const icon = btn.querySelector('i');
            icon.classList.add('spin-anim');
            await loadInitialData();
            setTimeout(() => icon.classList.remove('spin-anim'), 1000);
        }

        function setDeliveryType(type) {
            currentDeliveryType = type;
            const addrInput = document.getElementById('ext-address');
            document.getElementById('btn-dom').className = type === 'domicilio' ? "flex-1 py-2 rounded-xl font-bold bg-orange-600 text-white" : "flex-1 py-2 rounded-xl font-bold bg-gray-100 text-gray-500";
            document.getElementById('btn-pick').className = type === 'pickup' ? "flex-1 py-2 rounded-xl font-bold bg-orange-600 text-white" : "flex-1 py-2 rounded-xl font-bold bg-gray-100 text-gray-500";
            addrInput.style.display = type === 'domicilio' ? 'block' : 'none';
        }

        function createExternalOrder() {
            const name = document.getElementById('ext-name').value;
            const phone = document.getElementById('ext-phone').value;
            const address = document.getElementById('ext-address').value;
            if(!name || !phone) return alert("Nombre y Celular son obligatorios");
            const newOrder = { id: Date.now(), customer: `${name} (${currentDeliveryType.toUpperCase()})`, phone: phone, address: currentDeliveryType === 'pickup' ? 'PICKUP' : address, order: [] };
            state.externalOrders.push(newOrder);
            renderExternalOrders(); 
            openOrder('ext', newOrder.id);
            document.getElementById('ext-name').value = ""; document.getElementById('ext-phone').value = ""; document.getElementById('ext-address').value = "";
        }

        function renderExternalOrders() {
            document.getElementById('list-external').innerHTML = state.externalOrders.map(o => `
                <div class="bg-white p-4 rounded-3xl border flex justify-between items-center shadow-sm">
                    <div><b>${o.customer}</b><br><small class="text-gray-400">${o.phone}</small></div>
                    <button onclick="openOrder('ext', ${o.id})" class="bg-blue-600 text-white px-4 py-2 rounded-xl font-bold">ABRIR</button>
                </div>`).join('');
        }

        function updateExtraChargeUI() {
            const extra = extraChargeApplied ? (Math.max(0, selectedV1.length - 2) * 10 + Math.max(0, selectedV2.length - 2) * 10) : 0;
            document.getElementById('extra-charge-ui').innerHTML = `<div class="flex justify-between items-center text-sm"><div><p class="font-black text-orange-800">Cargos Extra: $${extra.toFixed(2)}</p></div><button onclick="extraChargeApplied = !extraChargeApplied; updateExtraChargeUI();" class="text-xs font-bold px-3 py-1 rounded-lg ${extraChargeApplied ? 'bg-white text-red-500 border' : 'bg-orange-600 text-white'}">${extraChargeApplied ? 'Quitar' : 'Aplicar'}</button></div>`;
        }

        function renderTables() {
            document.getElementById('grid-mesas').innerHTML = state.mesas.map(m => `
                <div onclick="openOrder('mesa', ${m.id})" class="aspect-square rounded-[2rem] flex flex-col items-center justify-center cursor-pointer border-2 ${m.order.length > 0 ? 'bg-orange-500 text-white border-orange-600' : 'bg-white border-gray-100'} transition-all">
                    <span class="text-3xl font-black italic">${m.id}</span>
                </div>`).join('');
        }

        function renderKitchen() {
            const cont = document.getElementById('kitchen-orders'); cont.innerHTML = '';
            state.mesas.filter(m => m.order.some(i => i.isNew) && !state.kitchenHide.includes('m'+m.id)).forEach(m => {
                cont.appendChild(createKitchenCard(`Mesa ${m.id}`, m.order.filter(i => i.isNew), () => { state.kitchenHide.push('m'+m.id); renderKitchen(); }));
            });
            state.externalOrders.filter(o => o.order.some(i => i.isNew) && !state.kitchenHide.includes('e'+o.id)).forEach(o => {
                cont.appendChild(createKitchenCard(`${o.customer}`, o.order.filter(i => i.isNew), () => { state.kitchenHide.push('e'+o.id); renderKitchen(); }));
            });
        }

        function createKitchenCard(title, items, onDone) {
            const div = document.createElement('div');
            div.className = "bg-white p-5 rounded-3xl border-t-8 border-orange-500 shadow-md";
            div.innerHTML = `<h4 class="font-black text-xl mb-4">${title}</h4><div class="space-y-2 mb-4 text-sm">${items.map(i => `• ${i.name}<br><span class="text-orange-600 font-bold ml-2">(${i.selectedVar || 'Base'})</span>`).join('<br>')}</div><button class="w-full bg-green-600 text-white py-3 rounded-2xl font-bold">LISTO / ENTREGADO</button>`;
            div.querySelector('button').onclick = onDone; return div;
        }

        function openOrder(type, id) {
            activeTarget = { type, id };
            let data = type === 'mesa' ? state.mesas.find(x => x.id == id) : state.externalOrders.find(x => x.id == id);
            document.getElementById('order-title').innerText = type === 'mesa' ? `Mesa ${id}` : data.customer;
            document.getElementById('order-modal').classList.remove('hidden');
            document.getElementById('menu-container').classList.remove('hidden');
            document.getElementById('product-config').classList.add('hidden');
            renderMenuSelector(); renderOrderItems(data.order);
        }

        function renderMenuSelector() {
            document.getElementById('menu-selector').innerHTML = state.menu.map(i => `<div onclick='initItemConfig(${JSON.stringify(i)})' class="bg-white p-4 rounded-2xl border cursor-pointer hover:border-orange-500 h-28 shadow-sm"><span class="font-bold">${i.name}</span><br><span class="text-orange-600 font-black italic">$${i.price}</span></div>`).join('');
        }

        function initItemConfig(item) {
            tempItem = { ...item };
            selectedV1 = []; selectedV2 = []; extraChargeApplied = true;
            document.getElementById('menu-container').classList.add('hidden');
            document.getElementById('product-config').classList.remove('hidden');
            document.getElementById('config-name').innerText = item.name;
            document.getElementById('v1-options').innerHTML = (item.varA || "").split(',').filter(x => x.trim()).map(v => `<button onclick="toggleV1('${v.trim()}', this)" class="variant-btn border-2 px-4 py-2 rounded-xl text-xs font-bold uppercase">${v.trim()}</button>`).join('');
            document.getElementById('v2-options').innerHTML = (item.varB || "").split(',').filter(x => x.trim()).map(v => `<button onclick="toggleV2('${v.trim()}', this)" class="variant-btn border-2 px-4 py-2 rounded-xl text-xs font-bold uppercase">${v.trim()}</button>`).join('');
            updateExtraChargeUI();
        }

        function toggleV1(val, btn) {
            const idx = selectedV1.indexOf(val);
            if(idx > -1) { selectedV1.splice(idx, 1); btn.classList.remove('active'); }
            else if(selectedV1.length < 4) { selectedV1.push(val); btn.classList.add('active'); }
            updateExtraChargeUI();
        }

        function toggleV2(val, btn) {
            const idx = selectedV2.indexOf(val);
            if(idx > -1) { selectedV2.splice(idx, 1); btn.classList.remove('active'); }
            else if(selectedV2.length < 4) { selectedV2.push(val); btn.classList.add('active'); }
            updateExtraChargeUI();
        }

        async function confirmItem() {
            const extra = extraChargeApplied ? (Math.max(0, selectedV1.length - 2) * 10 + Math.max(0, selectedV2.length - 2) * 10) : 0;
            const finalVars = [selectedV1.join(', '), selectedV2.join(', ')].filter(x => x).join(' | ');
            const final = { ...tempItem, price: parseFloat(tempItem.price) + extra, selectedVar: finalVars, note: document.getElementById('config-note').value, isNew: true };

            if(activeTarget.type === 'mesa') {
                const m = state.mesas.find(x => x.id == activeTarget.id); m.order.push(final);
                await _supabase.from('mesas').update({ order: JSON.stringify(m.order) }).eq('id', m.id);
                state.kitchenHide = state.kitchenHide.filter(id => id !== 'm'+m.id);
            } else { 
                const o = state.externalOrders.find(x => x.id == activeTarget.id); o.order.push(final); 
                state.kitchenHide = state.kitchenHide.filter(id => id !== 'e'+o.id);
            }
            openOrder(activeTarget.type, activeTarget.id);
            renderKitchen();
        }

        function renderOrderItems(items) {
            let total = 0;
            document.getElementById('order-items').innerHTML = items.map(i => {
                total += parseFloat(i.price);
                return `<div class="p-3 bg-gray-50 rounded-xl text-xs border flex justify-between ${i.isNew ? 'border-orange-500 bg-orange-50' : ''}"><span><b>${i.name}</b><br><small class="text-orange-600">${i.selectedVar || ''}</small></span><span class="font-bold">$${parseFloat(i.price).toFixed(2)}</span></div>`;
            }).join('');
            document.getElementById('order-total').innerText = `$${total.toFixed(2)}`;
        }

        async function finalizeSale(metodo) {
            let order, total = 0;
            if(activeTarget.type === 'mesa') {
                const m = state.mesas.find(x => x.id == activeTarget.id); order = m.order;
                total = order.reduce((acc, i) => acc + parseFloat(i.price), 0);
                await _supabase.from('mesas').update({ order: '[]' }).eq('id', m.id);
            } else {
                const o = state.externalOrders.find(x => x.id == activeTarget.id); order = o.order;
                total = order.reduce((acc, i) => acc + parseFloat(i.price), 0);
                state.externalOrders = state.externalOrders.filter(x => x.id != o.id);
            }
            if(total > 0) await _supabase.from('ventas').insert([{ waiter: state.currentUser.name, total, items: JSON.stringify(order), metodo_pago: metodo, archivado: false }]);
            document.getElementById('payment-modal').classList.add('hidden'); closeOrderModal(); loadInitialData();
        }

        async function attemptLogin() {
            const id = document.getElementById('emp-id').value; const pass = document.getElementById('emp-pass').value;
            await loadInitialData();
            const emp = state.employees.find(e => e.id == id && e.pass == pass);
            if(emp || (id === 'admin' && pass === '1234')) {
                state.currentUser = emp || {name: 'Admin'}; state.isAdmin = (id === 'admin');
                document.getElementById('login-screen').classList.add('hidden'); document.getElementById('main-app').classList.remove('hidden');
                setupRealtime();
            } else alert("PIN Incorrecto");
        }

        function showTab(t) { 
            document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active')); 
            document.getElementById('tab-'+t).classList.add('active'); 
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
            if(t === 'cocina') renderKitchen();
        }

        async function addProduct() {
            const name = document.getElementById('p-name').value; const price = document.getElementById('p-price').value;
            if(name && price) { await _supabase.from('menu').insert([{name, price, varA: document.getElementById('p-varA').value, varB: document.getElementById('p-varB').value}]); loadInitialData(); }
        }
        async function addMesa() { const id = document.getElementById('m-number').value; if(id) { await _supabase.from('mesas').insert([{id, order: '[]'}]); loadInitialData(); } }
        async function delP(id) { await _supabase.from('menu').delete().eq('id', id); loadInitialData(); }
        async function addEmployee() {
            const id = document.getElementById('e-id').value; const name = document.getElementById('e-name').value; const pass = document.getElementById('e-pass').value;
            if(id && name && pass) { await _supabase.from('empleados').insert([{ id, name, pass }]); loadInitialData(); }
        }
        async function delE(id) { if(confirm("¿Eliminar?")) { await _supabase.from('empleados').delete().eq('id', id); loadInitialData(); } }

        function renderAdminLists() {
            document.getElementById('admin-menu-list').innerHTML = state.menu.map(i => `<div class="p-2 border-b flex justify-between text-xs"><span>${i.name}</span><button onclick="delP(${i.id})" class="text-red-500">×</button></div>`).join('');
            document.getElementById('admin-mesas-list').innerHTML = state.mesas.map(m => `<div class="bg-gray-100 p-2 rounded-lg text-xs"><span>M${m.id}</span></div>`).join('');
            document.getElementById('admin-employees-list').innerHTML = state.employees.map(e => `<div class="p-2 border-b flex justify-between text-xs items-center"><span><b>${e.id}</b> - ${e.name}</span><button onclick="delE(${e.id})" class="text-red-500 font-bold">×</button></div>`).join('');
        }
        
        function updateAdminStats() {
            let e = state.history.filter(v => v.metodo_pago === 'Efectivo').reduce((a, b) => a + parseFloat(b.total), 0);
            document.getElementById('total-efectivo').innerText = `$${e.toFixed(2)}`;
        }
        async function doCorteCaja() {
            const { jsPDF } = window.jspdf; const doc = new jsPDF({ unit: 'mm', format: [80, 150] });
            doc.text("CORTE DE CAJA", 40, 10, {align: 'center'}); doc.save(`Corte.pdf`);
            await _supabase.from('ventas').update({ archivado: true }).eq('archivado', false); location.reload();
        }
        function closeOrderModal() { document.getElementById('order-modal').classList.add('hidden'); }
        function cancelConfig() { document.getElementById('product-config').classList.add('hidden'); document.getElementById('menu-container').classList.remove('hidden'); }
        function openPayment() { document.getElementById('payment-modal').classList.remove('hidden'); }
        async function checkAdminAccess() { if(state.isAdmin) showTab('admin'); else { if(prompt("PIN Admin:") === "1234") { state.isAdmin = true; showTab('admin'); } } }

        window.onload = () => { loadInitialData(); setDeliveryType('domicilio'); };
    </script>
</body>
</html>
