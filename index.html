<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SaborPOS Pro - Sistema Integral</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #f3f4f6; }
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        .variant-btn.active { border-color: #ea580c; background-color: #fff7ed; color: #ea580c; }
        
        @media print {
            body * { visibility: hidden; }
            #print-section, #print-section * { visibility: visible; }
            #print-section { position: absolute; left: 0; top: 0; width: 80mm; font-family: monospace; font-size: 12px; }
        }
    </style>
</head>
<body class="min-h-screen">

    <div id="print-section" class="hidden"></div>

    <div id="login-screen" class="fixed inset-0 z-[100] flex items-center justify-center bg-orange-600">
        <div class="bg-white p-8 rounded-3xl shadow-2xl w-full max-w-sm m-4">
            <div class="text-center mb-8">
                <i data-lucide="utensils-crosses" class="text-orange-600 w-12 h-12 mx-auto mb-2"></i>
                <h1 class="text-3xl font-black text-gray-800">SaborPOS</h1>
            </div>
            <div class="space-y-4">
                <input type="text" id="emp-id" placeholder="ID de Usuario" class="w-full px-4 py-3 rounded-xl border outline-none">
                <input type="password" id="emp-pass" placeholder="Contraseña" class="w-full px-4 py-3 rounded-xl border outline-none">
                <button onclick="attemptLogin()" class="w-full bg-orange-600 text-white py-4 rounded-xl font-bold">Entrar</button>
            </div>
            <p id="login-error" class="text-red-500 text-sm mt-4 text-center hidden">Credenciales Incorrectas</p>
        </div>
    </div>

    <div id="main-app" class="hidden pb-24 lg:pb-0 lg:pl-64">
        <nav class="fixed bottom-0 left-0 right-0 bg-white border-t lg:border-t-0 lg:border-r lg:w-64 lg:top-0 lg:h-full z-40 flex lg:flex-col justify-around lg:justify-start lg:p-4 shadow-2xl">
            <div class="hidden lg:block mb-8 px-4 pt-4 font-black text-2xl text-orange-600">SaborPOS</div>
            <button onclick="showTab('mesas')" class="nav-btn p-3 flex flex-col lg:flex-row items-center lg:px-4 lg:mb-2 text-gray-500" id="btn-mesas"><i data-lucide="layout-grid" class="lg:mr-3"></i><span>Mesas</span></button>
            <button onclick="showTab('domicilio')" class="nav-btn p-3 flex flex-col lg:flex-row items-center lg:px-4 lg:mb-2 text-gray-500" id="btn-domicilio"><i data-lucide="truck" class="lg:mr-3"></i><span>Envíos</span></button>
            <button onclick="showTab('cocina')" class="nav-btn p-3 flex flex-col lg:flex-row items-center lg:px-4 lg:mb-2 text-gray-500" id="btn-cocina"><i data-lucide="flame" class="lg:mr-3"></i><span>Cocina</span></button>
            <button onclick="checkAdminAccess()" class="nav-btn p-3 flex flex-col lg:flex-row items-center lg:px-4 lg:mb-2 text-gray-500" id="btn-admin"><i data-lucide="shield-check" class="lg:mr-3"></i><span>Admin</span></button>
            <button onclick="location.reload()" class="p-3 flex flex-col lg:flex-row items-center lg:px-4 text-red-500 mt-auto"><i data-lucide="log-out" class="lg:mr-3"></i><span>Cerrar</span></button>
        </nav>

        <main class="p-4 lg:p-8 max-w-7xl mx-auto">
            <div id="tab-mesas" class="tab-content active">
                <h2 class="text-3xl font-black mb-6">Salón</h2>
                <div id="grid-mesas" class="grid grid-cols-2 md:grid-cols-4 lg:grid-cols-5 gap-6"></div>
            </div>

            <div id="tab-domicilio" class="tab-content">
                <h2 class="text-3xl font-black mb-6">Pedidos Externos</h2>
                <div class="grid lg:grid-cols-3 gap-8">
                    <div class="bg-white p-6 rounded-3xl border shadow-sm h-fit">
                        <div class="flex gap-2 mb-6 bg-gray-100 p-1 rounded-xl">
                            <button onclick="setExternalType('domicilio')" id="type-dom" class="flex-1 py-2 rounded-lg font-bold text-sm bg-orange-600 text-white">Domicilio</button>
                            <button onclick="setExternalType('pickup')" id="type-pick" class="flex-1 py-2 rounded-lg font-bold text-sm text-gray-500">Pickup</button>
                        </div>
                        <div class="space-y-4">
                            <input type="text" id="ext-name" placeholder="Nombre del Cliente" class="w-full p-3 border rounded-xl outline-none">
                            <input type="tel" id="ext-phone" placeholder="Celular" class="w-full p-3 border rounded-xl outline-none">
                            <div id="div-address">
                                <textarea id="ext-address" placeholder="Dirección completa" class="w-full p-3 border rounded-xl outline-none h-24"></textarea>
                            </div>
                            <button onclick="createExternalOrder()" class="w-full bg-blue-600 text-white py-4 rounded-xl font-bold shadow-lg">Crear Pedido</button>
                        </div>
                    </div>
                    <div id="list-external" class="lg:col-span-2 grid gap-4"></div>
                </div>
            </div>

            <div id="tab-cocina" class="tab-content">
                <div class="flex justify-between items-center mb-8">
                    <h2 class="text-3xl font-black">Cocina</h2>
                    <button onclick="loadInitialData().then(renderKitchen)" class="bg-green-600 text-white px-6 py-2 rounded-xl flex items-center"><i data-lucide="refresh-cw" class="mr-2 w-4"></i> Actualizar</button>
                </div>
                <div id="kitchen-orders" class="grid md:grid-cols-2 lg:grid-cols-3 gap-6"></div>
            </div>

            <div id="tab-admin" class="tab-content">
                <div class="flex flex-col md:flex-row justify-between mb-8 gap-4">
                    <h2 class="text-3xl font-black">Admin</h2>
                    <div class="bg-white p-4 rounded-2xl border flex items-center gap-4">
                        <p class="text-xs font-bold text-gray-400">FONDO $</p>
                        <input type="number" id="cash-fondo" onchange="updateFondoCaja()" class="font-bold text-xl w-24 outline-none ml-1">
                    </div>
                </div>
                <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-8">
                    <div class="bg-white p-6 rounded-3xl border shadow-sm">
                        <p class="text-xs font-bold text-gray-400 uppercase">Ventas Turno</p>
                        <h3 id="total-ventas-dia" class="text-3xl font-black text-gray-800">$0.00</h3>
                    </div>
                    <div class="bg-white p-6 rounded-3xl border shadow-sm">
                        <p class="text-xs font-bold text-gray-400 uppercase">Caja Total</p>
                        <h3 id="total-en-caja" class="text-3xl font-black text-green-600">$0.00</h3>
                    </div>
                    <button onclick="doCorteCaja()" class="bg-gray-900 text-white rounded-3xl p-6 font-bold flex flex-col items-center justify-center"><i data-lucide="printer" class="mb-2"></i> REALIZAR CORTE</button>
                </div>
                <div class="grid lg:grid-cols-2 gap-8">
                    <div class="bg-white p-6 rounded-3xl border">
                        <h3 class="font-bold mb-4">Menú</h3>
                        <div class="grid grid-cols-2 gap-2 mb-4">
                            <input type="text" id="p-name" placeholder="Nombre" class="p-2 border rounded-lg">
                            <input type="number" id="p-price" placeholder="Precio" class="p-2 border rounded-lg">
                            <input type="text" id="p-varA" placeholder="Variante 1" class="p-2 border rounded-lg">
                            <input type="text" id="p-varB" placeholder="Variante 2" class="p-2 border rounded-lg">
                            <button onclick="addProduct()" class="col-span-2 bg-orange-600 text-white p-2 rounded-lg font-bold">Guardar</button>
                        </div>
                        <div id="table-menu" class="max-h-60 overflow-y-auto divide-y"></div>
                    </div>
                    <div class="bg-white p-6 rounded-3xl border">
                        <h3 class="font-bold mb-4">Empleados</h3>
                        <div class="grid grid-cols-3 gap-2 mb-4">
                            <input type="text" id="e-id" placeholder="ID" class="p-2 border rounded-lg">
                            <input type="text" id="e-name" placeholder="Nombre" class="p-2 border rounded-lg">
                            <input type="text" id="e-pass" placeholder="PIN" class="p-2 border rounded-lg">
                            <button onclick="addEmployee()" class="col-span-3 bg-blue-600 text-white p-2 rounded-lg font-bold">Añadir</button>
                        </div>
                        <div id="table-emps" class="max-h-60 overflow-y-auto divide-y"></div>
                    </div>
                    <div class="bg-white p-6 rounded-3xl border lg:col-span-2">
                        <h3 class="font-bold mb-4">Mapa de Mesas</h3>
                        <div class="flex gap-2 mb-4">
                            <input type="number" id="m-number" placeholder="Número" class="p-2 border rounded-lg w-32">
                            <button onclick="addMesa()" class="bg-green-600 text-white px-6 rounded-lg font-bold">Añadir Mesa</button>
                        </div>
                        <div id="list-mesas-admin" class="grid grid-cols-4 md:grid-cols-10 gap-2"></div>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <div id="order-modal" class="fixed inset-0 bg-black/60 z-[200] hidden flex items-center justify-center p-4">
        <div class="bg-white w-full max-w-5xl h-[90vh] rounded-[2rem] flex flex-col overflow-hidden">
            <div class="p-6 bg-orange-600 text-white flex justify-between items-center">
                <h3 id="order-title" class="text-2xl font-black">Pedido</h3>
                <button onclick="closeOrderModal()" class="bg-white/20 p-2 rounded-full"><i data-lucide="x"></i></button>
            </div>
            <div class="flex-1 flex flex-col md:flex-row overflow-hidden">
                <div id="menu-container" class="flex-1 p-6 overflow-y-auto bg-gray-50">
                    <div id="menu-selector" class="grid grid-cols-2 sm:grid-cols-3 gap-4"></div>
                </div>
                <div id="product-config" class="hidden flex-1 p-6 flex flex-col">
                    <h4 id="config-name" class="text-2xl font-bold mb-6"></h4>
                    <div class="space-y-6 flex-1">
                        <div id="v1-container"><label class="font-bold text-sm block mb-2">Variante 1</label><div id="v1-options" class="grid grid-cols-2 gap-2"></div></div>
                        <div id="v2-container"><label class="font-bold text-sm block mb-2">Variante 2</label><div id="v2-options" class="grid grid-cols-2 gap-2"></div></div>
                        <textarea id="config-note" class="w-full p-4 bg-gray-50 border rounded-xl" placeholder="Notas..."></textarea>
                    </div>
                    <div class="flex gap-4 mt-6">
                        <button onclick="cancelConfig()" class="flex-1 p-4 bg-gray-200 rounded-xl">Cancelar</button>
                        <button onclick="confirmItem()" class="flex-1 p-4 bg-orange-600 text-white rounded-xl">Agregar</button>
                    </div>
                </div>
                <div class="w-full md:w-80 p-6 border-l bg-white flex flex-col">
                    <div id="order-items" class="flex-1 overflow-y-auto space-y-2 mb-4"></div>
                    <div class="border-t pt-4">
                        <div class="flex justify-between font-black text-xl mb-4"><span>TOTAL</span><span id="order-total">$0.00</span></div>
                        <button onclick="sendKitchenSignal()" class="w-full bg-gray-800 text-white py-4 rounded-xl font-bold mb-2">ORDENAR</button>
                        <button onclick="openPayment()" class="w-full bg-green-600 text-white py-4 rounded-xl font-bold">COBRAR</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div id="payment-modal" class="fixed inset-0 bg-black/80 z-[300] hidden flex items-center justify-center p-4">
        <div class="bg-white rounded-3xl p-8 max-w-sm w-full text-center">
            <h3 class="text-xl font-bold mb-6">Seleccionar Pago</h3>
            <div class="grid gap-3">
                <button onclick="finalizeSale('Efectivo')" class="p-4 bg-gray-100 rounded-2xl font-bold">EFECTIVO</button>
                <button onclick="finalizeSale('Tarjeta')" class="p-4 bg-gray-100 rounded-2xl font-bold">TARJETA</button>
                <button onclick="document.getElementById('payment-modal').classList.add('hidden')" class="mt-4 text-gray-400">Regresar</button>
            </div>
        </div>
    </div>

    <script>
        const supabaseUrl = 'https://wnboqxpggbvktrumqcat.supabase.co';
        const supabaseKey = 'sb_publishable_xbTlbpq30V9ZwX6xyEx3bA_-LNiuI0p'; 
        const _supabase = supabase.createClient(supabaseUrl, supabaseKey);

        let state = { currentUser: null, isAdmin: false, menu: [], mesas: [], empleados: [], history: [], externalOrders: [], fondoCaja: 0, currentExternalType: 'domicilio', kitchenHideList: [] };
        let activeTarget = { type: null, id: null };
        let tempItem = null;

        const refreshIcons = () => lucide.createIcons();

        async function loadInitialData() {
            const { data: menu } = await _supabase.from('menu').select('*');
            const { data: mesas } = await _supabase.from('mesas').select('*').order('id', { ascending: true });
            const { data: empleados } = await _supabase.from('empleados').select('*');
            const { data: ventas } = await _supabase.from('ventas').select('*').eq('archivado', false);
            state.menu = menu || [];
            state.mesas = (mesas || []).map(m => ({...m, order: JSON.parse(m.order || '[]')}));
            state.empleados = empleados || [];
            state.history = ventas || [];
            state.fondoCaja = parseFloat(localStorage.getItem('fondoCaja')) || 0;
            document.getElementById('cash-fondo').value = state.fondoCaja;
            updateAdminStats();
        }

        async function attemptLogin() {
            await loadInitialData();
            const id = document.getElementById('emp-id').value;
            const pass = document.getElementById('emp-pass').value;
            const emp = state.empleados.find(e => e.id === id && e.pass === pass);
            if(emp) {
                state.currentUser = emp;
                state.isAdmin = (id === 'admin');
                document.getElementById('login-screen').classList.add('hidden');
                document.getElementById('main-app').classList.remove('hidden');
                showTab('mesas');
                renderTables();
            } else { document.getElementById('login-error').classList.remove('hidden'); }
        }

        function showTab(tabName) {
            document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('text-orange-600', 'bg-orange-100'));
            document.getElementById(`tab-${tabName}`).classList.add('active');
            document.getElementById(`btn-${tabName}`).classList.add('text-orange-600', 'bg-orange-100');
            if(tabName === 'cocina') renderKitchen();
            if(tabName === 'admin') { updateAdminStats(); renderMenuAdmin(); renderMesasAdmin(); renderEmpsAdmin(); }
            if(tabName === 'domicilio') renderExternalOrders();
            refreshIcons();
        }

        function renderTables() {
            const grid = document.getElementById('grid-mesas');
            grid.innerHTML = '';
            state.mesas.forEach(m => {
                const isOccupied = m.order.length > 0;
                const div = document.createElement('div');
                div.className = `aspect-square rounded-3xl flex flex-col items-center justify-center cursor-pointer border-2 transition-all ${isOccupied ? 'bg-orange-500 text-white border-orange-600' : 'bg-white border-gray-100 hover:border-orange-200'}`;
                div.onclick = () => openOrder('mesa', m.id);
                div.innerHTML = `<span class="text-4xl font-black">${m.id}</span><span class="text-[10px] font-bold uppercase opacity-60">${isOccupied ? 'Ocupada' : 'Libre'}</span>`;
                grid.appendChild(div);
            });
        }

        // --- LÓGICA DE COBRO (AQUÍ ES DONDE SE PONE EN CERO) ---
        async function finalizeSale(metodo) {
            let order, total = 0;
            
            if(activeTarget.type === 'mesa') {
                const m = state.mesas.find(x => x.id === activeTarget.id);
                order = [...m.order];
                total = order.reduce((acc, item) => acc + parseFloat(item.price), 0);
                
                // SOLO AL COBRAR LIMPIAMOS LA MESA EN SUPABASE
                m.order = [];
                await _supabase.from('mesas').update({ status: 'libre', order: '[]' }).eq('id', m.id);
                
                // También quitar de la vista temporal de cocina
                state.kitchenHideList.push(`mesa-${m.id}`);
            } else {
                const o = state.externalOrders.find(x => x.id === activeTarget.id);
                order = [...o.order];
                total = order.reduce((acc, item) => acc + parseFloat(item.price), 0);
                state.externalOrders = state.externalOrders.filter(x => x.id !== o.id);
                state.kitchenHideList.push(`ext-${o.id}`);
            }

            if(total <= 0) return alert("No hay productos para cobrar.");

            // Registrar Venta
            await _supabase.from('ventas').insert([{
                waiter: state.currentUser.name,
                total: total,
                items: JSON.stringify(order),
                metodo_pago: metodo,
                archivado: false
            }]);

            // Sumar al empleado
            const emp = state.empleados.find(e => e.id === state.currentUser.id);
            if(emp) {
                const ns = (parseFloat(emp.sales || 0)) + total;
                await _supabase.from('empleados').update({ sales: ns }).eq('id', emp.id);
            }

            alert(`Venta finalizada: $${total.toFixed(2)}`);
            document.getElementById('payment-modal').classList.add('hidden');
            document.getElementById('order-modal').classList.add('hidden');
            loadInitialData().then(() => { renderTables(); renderExternalOrders(); });
        }

        // --- COCINA (EL DESPACHAR SOLO OCULTA) ---
        function renderKitchen() {
            const cont = document.getElementById('kitchen-orders');
            cont.innerHTML = '';
            const list = [];
            
            state.mesas.forEach(m => {
                if(m.order.length > 0 && !state.kitchenHideList.includes(`mesa-${m.id}`)) {
                    list.push({title: `MESA ${m.id}`, items: m.order, id: m.id, type: 'mesa', key: `mesa-${m.id}`});
                }
            });
            
            state.externalOrders.forEach(o => {
                if(o.order.length > 0 && !state.kitchenHideList.includes(`ext-${o.id}`)) {
                    list.push({title: o.customer, items: o.order, id: o.id, type: 'ext', address: o.address, key: `ext-${o.id}`});
                }
            });

            list.forEach(c => {
                const div = document.createElement('div');
                div.className = "bg-white p-5 rounded-2xl shadow-md border-t-8 border-orange-500";
                div.innerHTML = `
                    <div class="flex justify-between items-center mb-4"><span class="font-black text-xl">${c.title}</span>
                    <button onclick='printTicketCocina(${JSON.stringify(c)})' class="text-orange-600"><i data-lucide="printer"></i></button></div>
                    ${c.address ? `<p class="text-[10px] text-gray-400 font-bold mb-2">${c.address}</p>` : ''}
                    <div class="space-y-1 mb-4">${c.items.map(i => `<p class="text-sm"><b>1x</b> ${i.name} <span class="text-[10px] opacity-60">(${i.selectedVar})</span></p>`).join('')}</div>
                    <button onclick="clearComanda('${c.key}')" class="w-full bg-green-600 text-white py-3 rounded-xl font-bold">DESPACHAR</button>`;
                cont.appendChild(div);
            });
            refreshIcons();
        }

        function clearComanda(key) {
            // El despachar solo lo quita de la vista de cocina, pero NO borra la mesa.
            state.kitchenHideList.push(key);
            renderKitchen();
        }

        function printTicketCocina(c) {
            const p = document.getElementById('print-section');
            p.innerHTML = `<div style="text-align:center; padding:10px;"><h2 style="margin:0">${c.title}</h2><hr><div style="text-align:left;">${c.items.map(i => `<p>1x ${i.name}<br><small>${i.selectedVar}</small></p>`).join('')}</div></div>`;
            window.print();
        }

        // --- LÓGICA DE PEDIDOS EXTERNOS ---
        function setExternalType(type) {
            state.currentExternalType = type;
            document.getElementById('type-dom').className = type === 'domicilio' ? "flex-1 py-2 rounded-lg font-bold text-sm bg-orange-600 text-white" : "flex-1 py-2 rounded-lg font-bold text-sm text-gray-500";
            document.getElementById('type-pick').className = type === 'pickup' ? "flex-1 py-2 rounded-lg font-bold text-sm bg-orange-600 text-white" : "flex-1 py-2 rounded-lg font-bold text-sm text-gray-500";
            document.getElementById('div-address').classList.toggle('hidden', type === 'pickup');
        }

        function createExternalOrder() {
            const name = document.getElementById('ext-name').value;
            const phone = document.getElementById('ext-phone').value;
            const address = document.getElementById('ext-address').value;
            if(!name || !phone) return alert("Faltan datos");
            const newOrder = { id: Date.now(), customer: name, phone: phone, address: state.currentExternalType === 'domicilio' ? address : 'PICKUP', type: state.currentExternalType, order: [] };
            state.externalOrders.push(newOrder);
            openOrder('ext', newOrder.id);
            document.getElementById('ext-name').value = ""; document.getElementById('ext-phone').value = ""; document.getElementById('ext-address').value = "";
        }

        function renderExternalOrders() {
            const cont = document.getElementById('list-external');
            cont.innerHTML = state.externalOrders.map(o => `
                <div class="bg-white p-4 rounded-3xl border shadow-sm flex justify-between items-center">
                    <div><p class="font-black text-gray-800">${o.customer}</p><p class="text-[10px] text-gray-400 font-bold uppercase">${o.type}</p></div>
                    <button onclick="openOrder('ext', ${o.id})" class="bg-orange-600 text-white px-6 py-2 rounded-xl text-sm font-bold">Abrir</button>
                </div>
            `).join('');
        }

        // --- ADMINISTRACIÓN ---
        async function doCorteCaja() {
            if(!confirm("¿Cerrar turno?")) return;
            await _supabase.from('ventas').update({ archivado: true }).eq('archivado', false);
            for(let e of state.empleados) await _supabase.from('empleados').update({ sales: 0 }).eq('id', e.id);
            state.kitchenHideList = [];
            alert("Turno cerrado"); location.reload();
        }

        function updateAdminStats() {
            let tv = state.history.reduce((a, b) => a + parseFloat(b.total), 0);
            document.getElementById('total-ventas-dia').innerText = `$${tv.toFixed(2)}`;
            document.getElementById('total-en-caja').innerText = `$${(tv + state.fondoCaja).toFixed(2)}`;
        }

        // --- FUNCIONES DE MODAL ---
        function openOrder(type, id) {
            activeTarget = { type, id };
            const data = type === 'mesa' ? state.mesas.find(x => x.id === id) : state.externalOrders.find(x => x.id === id);
            document.getElementById('order-title').innerText = type === 'mesa' ? `Mesa ${id}` : data.customer;
            document.getElementById('order-modal').classList.remove('hidden');
            renderMenuSelector(); renderOrderItems(data.order); cancelConfig();
        }

        function renderMenuSelector() {
            const cont = document.getElementById('menu-selector');
            cont.innerHTML = state.menu.map(i => `<div onclick='initItemConfig(${JSON.stringify(i)})' class="bg-white p-4 rounded-xl border cursor-pointer font-bold shadow-sm">${i.name}<br><span class="text-orange-600">$${i.price}</span></div>`).join('');
        }

        function initItemConfig(item) {
            tempItem = { ...item, v1: null, v2: null };
            document.getElementById('menu-container').classList.add('hidden');
            document.getElementById('product-config').classList.remove('hidden');
            document.getElementById('config-name').innerText = item.name;
            const r = (s, id) => {
                const c = document.getElementById(id);
                if(s) { c.parentElement.classList.remove('hidden'); c.innerHTML = s.split(',').map(v => `<button onclick="selectVar('${id}', '${v.trim()}', this)" class="variant-btn border p-2 rounded-lg font-bold bg-gray-50 text-xs">${v.trim()}</button>`).join(''); }
                else c.parentElement.classList.add('hidden');
            };
            r(item.varA, 'v1-options'); r(item.varB, 'v2-options');
        }

        function selectVar(id, val, btn) {
            btn.parentElement.querySelectorAll('button').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            if(id === 'v1-options') tempItem.v1 = val; else tempItem.v2 = val;
        }

        async function confirmItem() {
            const vStr = [tempItem.v1, tempItem.v2].filter(Boolean).join(' / ') || "Normal";
            const final = { ...tempItem, selectedVar: vStr, note: document.getElementById('config-note').value };
            if(activeTarget.type === 'mesa') {
                const m = state.mesas.find(x => x.id === activeTarget.id);
                m.order.push(final);
                await _supabase.from('mesas').update({ order: JSON.stringify(m.order), status: 'ocupada' }).eq('id', m.id);
                // Si estaba en el hideList de cocina, lo sacamos porque hay algo nuevo
                state.kitchenHideList = state.kitchenHideList.filter(k => k !== `mesa-${m.id}`);
            } else { 
                const o = state.externalOrders.find(x => x.id === activeTarget.id);
                o.order.push(final);
                state.kitchenHideList = state.kitchenHideList.filter(k => k !== `ext-${o.id}`);
            }
            openOrder(activeTarget.type, activeTarget.id);
        }

        function renderOrderItems(items) {
            const cont = document.getElementById('order-items');
            let t = 0;
            cont.innerHTML = items.map(i => { t += parseFloat(i.price); return `<div class="bg-gray-50 p-2 rounded-lg text-xs flex justify-between"><span>${i.name}</span><span>$${i.price}</span></div>`; }).join('');
            document.getElementById('order-total').innerText = `$${t.toFixed(2)}`;
        }

        function renderMenuAdmin() {
            document.getElementById('table-menu').innerHTML = state.menu.map(i => `<div class="flex justify-between p-3"><span>${i.name} ($${i.price})</span><button onclick="deleteProduct(${i.id})" class="text-red-500"><i data-lucide="trash-2" class="w-4"></i></button></div>`).join(''); refreshIcons();
        }
        function renderEmpsAdmin() {
            document.getElementById('table-emps').innerHTML = state.empleados.map(e => `<div class="flex justify-between p-3"><span>${e.name}</span><button onclick="deleteEmployee('${e.id}')" class="text-red-500"><i data-lucide="trash-2" class="w-4"></i></button></div>`).join(''); refreshIcons();
        }
        function renderMesasAdmin() {
            document.getElementById('list-mesas-admin').innerHTML = state.mesas.map(m => `<div class="bg-gray-50 p-2 rounded border text-center relative">${m.id}<button onclick="deleteMesa(${m.id})" class="absolute -top-1 -right-1 bg-red-500 text-white rounded-full w-4 h-4 text-[8px]">X</button></div>`).join('');
        }

        async function addProduct() {
            const n = document.getElementById('p-name').value, p = document.getElementById('p-price').value, vA = document.getElementById('p-varA').value, vB = document.getElementById('p-varB').value;
            if(!n || !p) return;
            await _supabase.from('menu').insert([{name: n, price: parseFloat(p), varA: vA, varB: vB}]);
            loadInitialData().then(renderMenuAdmin);
        }
        async function deleteProduct(id) { await _supabase.from('menu').delete().eq('id', id); loadInitialData().then(renderMenuAdmin); }
        async function addEmployee() {
            const i = document.getElementById('e-id').value, n = document.getElementById('e-name').value, p = document.getElementById('e-pass').value;
            if(!i || !n || !p) return;
            await _supabase.from('empleados').insert([{id: i, name: n, pass: p, sales: 0}]);
            loadInitialData().then(renderEmpsAdmin);
        }
        async function deleteEmployee(id) { await _supabase.from('empleados').delete().eq('id', id); loadInitialData().then(renderEmpsAdmin); }
        async function addMesa() {
            const n = document.getElementById('m-number').value; if(!n) return;
            await _supabase.from('mesas').insert([{id: n, status: 'libre', order: '[]'}]);
            loadInitialData().then(() => { renderTables(); renderMesasAdmin(); });
        }
        async function deleteMesa(id) { await _supabase.from('mesas').delete().eq('id', id); loadInitialData().then(() => { renderTables(); renderMesasAdmin(); }); }

        function cancelConfig() { document.getElementById('product-config').classList.add('hidden'); document.getElementById('menu-container').classList.remove('hidden'); }
        function closeOrderModal() { document.getElementById('order-modal').classList.add('hidden'); renderTables(); renderExternalOrders(); }
        function openPayment() { document.getElementById('payment-modal').classList.remove('hidden'); }
        function updateFondoCaja() { localStorage.setItem('fondoCaja', document.getElementById('cash-fondo').value); loadInitialData(); }
        function sendKitchenSignal() { alert("Orden enviada"); closeOrderModal(); }
        async function checkAdminAccess() { if(state.isAdmin) showTab('admin'); else { if(prompt("PIN Admin:") === "1234") { state.isAdmin = true; showTab('admin'); } } }

        window.onload = loadInitialData;
    </script>
</body>
</html>
